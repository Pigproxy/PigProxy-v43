<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link href="//__alloy_style.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@400;500&family=DM+Mono:wght@400&display=swap');
    :root{--bg:#0d0a0e;--surface:#16101a;--border:#2e2035;--accent:#e0427f;--text:#f0eaf4;--text-muted:#8a7595;--danger:#ff4d6a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center;}
    .snout-wrap{margin-bottom:20px;}
    h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--danger);margin-bottom:10px;}
    .msg{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);background:#1a0e10;border:1px solid rgba(255,77,106,0.2);border-radius:8px;padding:12px 16px;margin:16px 0;word-break:break-all;text-align:left;line-height:1.6;}
    .back{display:inline-block;margin-top:16px;background:var(--accent);border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:11px 28px;text-decoration:none;transition:opacity 0.2s;}
    .back:hover{opacity:0.85;}
  </style>
</head>
<body>
<div class="card">
  <div class="snout-wrap">
    <svg width="52" height="52" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#ff4d6a" fill-opacity="0.12"/>
      <rect x="8" y="10" width="32" height="28" rx="10" fill="#ff4d6a" fill-opacity="0.8"/>
      <circle cx="18" cy="26" r="5.5" fill="#c02040"/>
      <circle cx="30" cy="26" r="5.5" fill="#c02040"/>
      <circle cx="18" cy="26" r="2.5" fill="#0d0a0e"/>
      <circle cx="30" cy="26" r="2.5" fill="#0d0a0e"/>
    </svg>
  </div>
  <h1>Site Blocked</h1>
  <p style="font-size:13px;color:var(--text-muted);">PigProxy couldn't load that page — it may be blocked or unavailable.</p>
  <div class="msg">%ERROR%</div>
  <a href="/secret" class="back">← Back to Dashboard</a>
</div>
</body>
</html>
